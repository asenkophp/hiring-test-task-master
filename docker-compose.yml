
services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ecom_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      - mysql
      - redis
    networks:
      - ecom_net

  nginx:
    image: nginx:1.25-alpine
    container_name: ecom_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - ecom_net

  mysql:
    image: mariadb:11
    container_name: ecom_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ecommerce
      MYSQL_USER: ecom
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ecom_net

  redis:
    image: redis:7-alpine
    container_name: ecom_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    networks:
      - ecom_net

  horizon:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ecom_horizon
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/supervisor/horizon.conf:/etc/supervisor/conf.d/horizon.conf
    depends_on:
      - app
      - redis
      - mysql
    command: /usr/bin/supervisord -n -c /etc/supervisor/supervisord.conf
    networks:
      - ecom_net

  reverb:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ecom_reverb
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    ports:
      - "8081:8080"
    depends_on:
      - app
      - redis
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    networks:
      - ecom_net

volumes:
  mysql_data:

networks:
  ecom_net:
    driver: bridge
